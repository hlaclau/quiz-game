name: 'Compile Mermaid in Markdown'

on:
  push:
    paths:
      - 'docs/mermaid.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check mermaid.md exists
        run: |
          if [ ! -f "docs/mermaid.md" ]; then
            echo "Error: docs/mermaid.md not found"
            exit 1
          fi
          echo "Found docs/mermaid.md"
          echo "File content preview:"
          head -20 docs/mermaid.md

      - name: Compile Mermaid
        uses: neenjaw/compile-mermaid-markdown-action@0.3.1
        with:
          files: 'docs/mermaid.md'
          output: '.resources/mermaid'
        env:
          HIDE_CODEBLOCKS: 1
          ABSOLUTE_IMAGE_LINKS: 1
          OUTPUT_FILE_TYPE: "svg"

      - name: Verify SVG files generated
        run: |
          # Ensure .resources/mermaid directory exists
          mkdir -p .resources/mermaid
          
          echo "Checking for generated SVG files..."
          if ls .resources/mermaid/*.svg 1> /dev/null 2>&1; then
            echo "✅ SVG files found:"
            ls -lh .resources/mermaid/*.svg
          else
            echo "❌ No SVG files found in .resources/mermaid/"
            echo "Directory contents:"
            ls -la .resources/mermaid/ || echo "Directory is empty or doesn't exist"
            exit 1
          fi

      - name: Show changes
        run: |
          git status
          git diff

      - name: Commit files
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .resources/
          git diff --staged --quiet || git commit -m "chore: update Mermaid diagram SVGs [skip ci]"

      - name: Push changes
        if: github.event_name == 'push'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          force: false

