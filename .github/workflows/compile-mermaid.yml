name: 'Compile Mermaid in Markdown'

on:
  push:
    paths:
      - 'docs/mermaid.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compile Mermaid
        uses: neenjaw/compile-mermaid-markdown-action@0.3.1
        with:
          files: 'docs/mermaid.md'
          output: '.resources/mermaid'
        env:
          HIDE_CODEBLOCKS: 1
          ABSOLUTE_IMAGE_LINKS: 1
          OUTPUT_FILE_TYPE: "svg"

      - name: Organize SVG files
        run: |
          # Ensure .resources/mermaid directory exists
          mkdir -p .resources/mermaid
          
          # The action generates files with names like: mermaid-diagram-0.svg, mermaid-diagram-1.svg, etc.
          # This ensures they're always in the same location: .resources/mermaid/
          # Files are named based on the markdown file (mermaid.md) and diagram index
          echo "Mermaid diagrams compiled to .resources/mermaid/"
          ls -la .resources/mermaid/ || echo "No diagrams generated yet"

      - name: Show changes
        run: |
          git status
          git diff

      - name: Commit files
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .resources/
          git diff --staged --quiet || git commit -m "chore: update Mermaid diagram SVGs [skip ci]"

      - name: Push changes
        if: github.event_name == 'push'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          force: false

